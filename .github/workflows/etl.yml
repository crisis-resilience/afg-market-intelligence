name: Monthly ETL

on:
  schedule:
    # First day of each month at 02:00 UTC
    - cron: "0 2 1 * *"
  workflow_dispatch:
    inputs:
      products:
        description: "Space-separated product names to run (leave blank for all)"
        required: false

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        env:
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.products }}" ]; then
            python -m etl.run --products ${{ github.event.inputs.products }}
          else
            python -m etl.run
          fi
